name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.SERVICE_ACCOUNT_JSON }}

    - name: Set up gcloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: copilot-bigquery-demo

    - name: Build and push container
      run: |
        gcloud builds submit backend-api \
          --tag us-central1-docker.pkg.dev/copilot-bigquery-demo/cloud-run-source-deploy/backend-api:latest \
          --suppress-logs

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy copilot-bigquery-api \
          --image us-central1-docker.pkg.dev/copilot-bigquery-demo/cloud-run-source-deploy/backend-api:latest \
          --region us-central1 \
          --platform managed \
          --allow-unauthenticated \
          --service-account bigquery-copilot-sa@copilot-bigquery-demo.iam.gserviceaccount.com
